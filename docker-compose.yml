version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: studyquest-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_cozy_pass
      POSTGRES_DB: studyquest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: studyquest-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres_cozy_pass@db:5432/studyquest?schema=public
      - JWT_SECRET=studyquest_cozy_secret
      - OPENAI_API_KEY=your_openai_api_key_here
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: studyquest-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
