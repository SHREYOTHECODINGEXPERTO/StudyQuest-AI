services:
  - type: web
    name: studyquest-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # Render will ask you to paste your Neon DB connection string here
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure random key for you!
